<!DOCTYPE html>
<html>
<head>
    <title>Live AI Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <h1>Real-Time Vision Analysis</h1>
    <img src="/video_feed" width="600" style="border: 5px solid #333;">
    
    <div style="margin-top: 20px; font-size: 24px;">
        Detected: <strong id="detection-text">Waiting for data...</strong>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "...",
            authDomain: "...",
            databaseURL: "https://...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('live_status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('detection-text').innerText = data.object;
                console.log("Update received:", data.object);
            }
            else{
                document.getElementById('detection-text').innerText = "Unable to detect object";
                console.log("Update not received", data.object)
            }
        });
    </script>
</body>
</html>
